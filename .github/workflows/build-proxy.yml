name: Build and Test Proxy

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'proxy/**'
      - '.github/workflows/build-proxy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'proxy/**'
      - '.github/workflows/build-proxy.yml'
  workflow_dispatch:

jobs:
  build-proxy:
    name: Build and Test Go Proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: proxy/go.mod
        cache-dependency-path: proxy/go.sum

    - name: Install golangci-lint
      working-directory: proxy
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: golangci-lint
      working-directory: proxy
      run: golangci-lint run ./...

    - name: go vet
      working-directory: proxy
      run: go vet ./...

    - name: go test
      working-directory: proxy
      run: go test -race ./...

    - name: Build binary (linux/amd64)
      working-directory: proxy
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/linux_amd64/viking-bio-proxy ./cmd/proxy

    - name: "Smoke-test: server starts and API responds"
      run: |
        mkdir -p /tmp/proxy-data
        DATA_DIR=/tmp/proxy-data MDNS_DISABLE=1 proxy/dist/linux_amd64/viking-bio-proxy &
        SERVER_PID=$!
        sleep 2
        curl -sf http://localhost:3000/api/data
        curl -sf -X POST http://localhost:3000/api/machine-data \
          -H "Content-Type: application/json" \
          -d '{"flame":false,"fan":0,"temp":0,"err":0,"valid":true}'
        echo "Proxy started and responded successfully"
        kill "$SERVER_PID" || true

    - name: Cross-compile linux/arm64
      working-directory: proxy
      run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/linux_arm64/viking-bio-proxy ./cmd/proxy

    - name: Cross-compile windows/amd64
      working-directory: proxy
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/windows_amd64/viking-bio-proxy.exe ./cmd/proxy

    - name: Upload proxy binaries linux-amd64
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-proxy-linux-amd64
        path: |
          proxy/dist/linux_amd64/viking-bio-proxy
        retention-days: 30

    - name: Upload proxy binaries linux-arm64
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-proxy-linux-arm64
        path: |
          proxy/dist/linux_arm64/viking-bio-proxy
        retention-days: 30

    - name: Upload proxy binaries win-amd64
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-proxy-win-amd64
        path: |
          proxy/dist/windows_amd64/viking-bio-proxy.exe
        retention-days: 30
