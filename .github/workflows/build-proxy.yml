name: Build and Test Proxy

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'proxy/**'
      - '.github/workflows/build-proxy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'proxy/**'
      - '.github/workflows/build-proxy.yml'
  workflow_dispatch:

jobs:
  build-proxy:
    name: Build and Test Go Proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: proxy/go.mod
        cache-dependency-path: proxy/go.sum

    - name: Install golangci-lint
      working-directory: proxy
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: golangci-lint
      working-directory: proxy
      run: golangci-lint run ./...

    - name: go vet
      working-directory: proxy
      run: go vet ./...

    - name: go test
      working-directory: proxy
      run: go test -race ./...

    - name: Build binary (linux/amd64)
      working-directory: proxy
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/linux_amd64/viking-bio-proxy ./cmd/proxy

    - name: "Smoke-test: server starts and API responds"
      run: |
        set -euo pipefail
        mkdir -p /tmp/proxy-data
        cat > /tmp/proxy-data/devices.json <<'JSON'
        {
          "ci-device": {
            "key": "ci-secret",
            "last_seq": 0,
            "updated_at": 0
          }
        }
        JSON
        DATA_DIR=/tmp/proxy-data MDNS_DISABLE=1 proxy/dist/linux_amd64/viking-bio-proxy &
        SERVER_PID=$!
        sleep 2
        curl -sf http://localhost:3000/api/data
        python - <<'PY'
        import base64
        import hmac
        import json
        import socket
        import struct

        device = "ci-device"
        secret = b"ci-secret"
        seq = 1
        ts = 1
        data = {"flame": False, "fan": 0, "temp": 0, "err": 0, "valid": True}
        data_json = json.dumps(data, separators=(",", ":"))
        canonical = f"{device}\n{seq}\n{ts}\n{data_json}".encode()
        sig = base64.b64encode(hmac.new(secret, canonical, "sha256").digest()).decode()
        payload = json.dumps({
            "device": device,
            "seq": seq,
            "ts": ts,
            "data": data,
            "sig": sig,
        }, separators=(",", ":")).encode()

        sock = socket.socket(socket.AF_INET6, socket.SOCK_STREAM)
        sock.connect(("::1", 9000))
        sock.sendall(struct.pack(">I", len(payload)) + payload)
        sock.close()
        PY
        sleep 1
        python - <<'PY'
        import json

        with open("/tmp/proxy-data/devices.json", "r", encoding="utf-8") as f:
            devices = json.load(f)
        assert devices["ci-device"]["last_seq"] == 1, devices
        PY
        test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/machine-data)" = "404"
        curl -sf http://localhost:3000/api/data | grep -q '"valid":true'
        echo "Proxy started and responded successfully"
        kill "$SERVER_PID" || true

    - name: Cross-compile linux/arm64
      working-directory: proxy
      run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/linux_arm64/viking-bio-proxy ./cmd/proxy

    - name: Cross-compile windows/amd64
      working-directory: proxy
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/windows_amd64/viking-bio-proxy.exe ./cmd/proxy

    - name: Upload proxy binaries linux-amd64
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-proxy-linux-amd64
        path: |
          proxy/dist/linux_amd64/viking-bio-proxy
        retention-days: 30

    - name: Upload proxy binaries linux-arm64
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-proxy-linux-arm64
        path: |
          proxy/dist/linux_arm64/viking-bio-proxy
        retention-days: 30

    - name: Upload proxy binaries win-amd64
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-proxy-win-amd64
        path: |
          proxy/dist/windows_amd64/viking-bio-proxy.exe
        retention-days: 30
