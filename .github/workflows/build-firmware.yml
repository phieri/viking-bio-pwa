name: Build Raspberry Pi Pico W Firmware

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'proxy/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'proxy/**'
  workflow_dispatch:

env:
  PICO_SDK_VERSION: 2.2.0

jobs:
  build-bridge:
    name: Build Bridge Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        board: [pico_w, pico2_w]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

    - name: Cache Pico SDK
      id: cache-pico-sdk
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/pico-sdk
        key: pico-sdk-${{ env.PICO_SDK_VERSION }}

    - name: Checkout Pico SDK
      if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: raspberrypi/pico-sdk
        ref: ${{ env.PICO_SDK_VERSION }}
        path: pico-sdk
        submodules: recursive

    - name: Set Pico SDK path
      run: echo "PICO_SDK_PATH=${{ github.workspace }}/pico-sdk" >> $GITHUB_ENV

    - name: Create build directory
      run: mkdir -p pico-bridge/build

    - name: Configure CMake
      working-directory: pico-bridge/build
      run: cmake .. -DCMAKE_BUILD_TYPE=Release -DPICO_BOARD=${{ matrix.board }} -DWIFI_SSID="ci_build" -DWIFI_PASSWORD="ci_build"

    - name: Build firmware
      working-directory: pico-bridge/build
      run: make -j$(nproc)

    - name: List build artifacts
      working-directory: pico-bridge/build
      run: |
        echo "Build artifacts:"
        ls -lh *.uf2 *.elf *.bin 2>/dev/null || echo "No artifacts found"

    - name: "Check: firmware does not overlap LittleFS"
      working-directory: pico-bridge/build
      run: |
        python3 - "${{ matrix.board }}" <<'EOF'
        import re, os, sys

        FLASH_SIZES = {'pico_w': 2 * 1024 * 1024, 'pico2_w': 4 * 1024 * 1024}
        board = sys.argv[1]
        flash_size = FLASH_SIZES[board]

        header = os.path.join(os.path.dirname(os.path.abspath(__file__)),
                              '..', 'include', 'lfs_hal.h')
        with open(header) as f:
            content = f.read()
        m = re.search(r'#define LFS_FLASH_SIZE\s+(.*)', content)
        if not m:
            print('ERROR: LFS_FLASH_SIZE not found in lfs_hal.h')
            sys.exit(1)
        expr = re.sub(r'\bPICO_FLASH_SIZE_BYTES\b', str(flash_size), m.group(1).strip())
        if not re.fullmatch(r'[\d\s\+\-\*\/\(\)]+', expr):
            print(f'ERROR: LFS_FLASH_SIZE expression is not purely arithmetic: {expr!r}')
            sys.exit(1)
        lfs_size = int(eval(expr))  # noqa: S307 — validated arithmetic-only above
        lfs_offset = flash_size - lfs_size

        bins = sorted([f for f in os.listdir('.') if f.endswith('.bin')])
        if not bins:
            print('ERROR: no .bin file found')
            sys.exit(1)
        # Use the largest .bin to be conservative
        bin_file = max(bins, key=os.path.getsize)
        bin_size = os.path.getsize(bin_file)

        print(f'Board:           {board}')
        print(f'Flash size:      {flash_size // 1024} KB')
        print(f'LFS size:        {lfs_size // 1024} KB  ({lfs_size // 4096} blocks)')
        print(f'LFS offset:      0x{lfs_offset:06x}  ({lfs_offset // 1024} KB)')
        print(f'Firmware binary: {bin_size // 1024} KB  ({bin_file})')

        if bin_size > lfs_offset:
            print(f'ERROR: firmware ({bin_size} B) extends past LFS start ({lfs_offset} B)!')
            sys.exit(1)
        headroom = lfs_offset - bin_size
        print(f'OK: {headroom // 1024} KB headroom before LFS region')
        EOF
        EOF

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v7
      with:
        name: viking-bio-bridge-firmware-${{ matrix.board }}
        path: |
          pico-bridge/build/*.uf2
          pico-bridge/build/*.elf
          pico-bridge/build/*.bin
          pico-bridge/build/*.hex
        if-no-files-found: warn
