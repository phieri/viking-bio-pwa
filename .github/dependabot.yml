version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/proxy/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/.devcontainer/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"
