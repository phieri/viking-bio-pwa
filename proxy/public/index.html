<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1e242a">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="styles/blink-error.css">
<script src="app.js" defer></script>
<script type="module">
import { startBlink, stopBlink, setUserBlinkOptOut, isUserOptedOut } from '/scripts/continuousBlink.js';
window._blink = { startBlink, stopBlink };
const toggle = document.getElementById('blinkDisableToggle');
if (toggle) {
	toggle.checked = isUserOptedOut();
	toggle.addEventListener('change', () => {
		setUserBlinkOptOut(toggle.checked);
		if (toggle.checked) stopBlink(document.body); // opted out: stop immediately
		else if (document.body.classList.contains('error-active')) startBlink(document.body); // re-enable if error is active
	});
}
</script>
<title>Viking Bio 20 – instrumentpanel</title>
</head>
<body>
<h1>&#9919; Viking Bio 20</h1>
<div class="status connecting" id="status">Ansluter...</div>
<div class="grid">
<div class="card" id="flame-card">
<div class="label">Låga</div>
<div class="value" id="flame" aria-live="polite">-</div>
</div>
<div class="card">
<div class="label">Fläkthastighet</div>
<div class="value" id="fan">-</div>
<div class="unit">%</div>
</div>
<div class="card">
<div class="label">Temperatur</div>
<div class="value" id="temp">-</div>
<div class="unit">&deg;C</div>
</div>
<div class="card">
<div class="label">Felkod</div>
<div class="value" id="err">-</div>
<div class="unit">kod</div>
</div>
<div class="card">
<div class="label">Brinntid</div>
<div class="value" id="flame-hours">-</div>
<div class="unit">timmar</div>
</div>
<div class="card">
<div class="label">Prenumeranter</div>
<div class="value" id="subscribers">-</div>
<div class="unit">antal</div>
</div>
<div class="card">
<div class="label">Säsongsskifte</div>
<div class="value" id="season-countdown">-</div>
<div class="unit" id="season-target">dagar</div>
</div>
</div>
<div class="actions">
	<div class="subscription">
		<div class="subs-checkboxes">
			<label><input type="checkbox" id="flameSub"> Låga på/av</label>
			<label><input type="checkbox" id="errorSub"> Fel</label>
			<label><input type="checkbox" id="cleanSub"> Städpåminnelse (lör 07:00, nov&ndash;mar)</label>
			<label><input type="checkbox" id="blinkDisableToggle"> Inaktivera blinkning vid fel</label>
		</div>
		<button class="btn btn-push" id="pushBtn" onclick="updateSubscription()">Aktivera aviseringar</button>
		<button class="btn btn-unsub" id="unsubBtn" onclick="unsubscribePush()" style="display:none">Avregistrera</button>
		<div id="pushSource" class="push-source"></div>
	</div>
</div>
</body>
</html>
