<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Error Blink Demo</title>
  <link rel="stylesheet" href="/styles/blink-error.css" />
  <style>
    body { background: var(--page-bg); color: #fff; font-family: sans-serif; }
  </style>
</head>
<body>
  <div style="max-width:900px;margin:24px">
    <h1>Site content</h1>

    <!-- Example visible error banner. Your app might create/remove such an element -->
    <div id="site-error" class="error-banner" style="display:none" role="status" aria-live="assertive">
      <strong>Error:</strong> Something went wrong.
    </div>

    <label style="display:block;margin:12px 0">
      <input id="disable-toggle" type="checkbox" /> Disable flashing (persist)
    </label>

    <button id="show-error">Show Error</button>
    <button id="clear-error">Clear Error</button>
  </div>

  <script type="module">
    import { startBlink, stopBlink, enableAutoBlink, setUserBlinkOptOut, isUserOptedOut } from '/scripts/continuousBlink.js';

    // Wire up the demo buttons
    const err = document.getElementById('site-error');
    document.getElementById('show-error').addEventListener('click', () => {
      err.style.display = 'block';
      // Start blinking page while error is present:
      startBlink(document.body);
    });
    document.getElementById('clear-error').addEventListener('click', () => {
      err.style.display = 'none';
      stopBlink(document.body);
    });

    // User preference toggle:
    const checkbox = document.getElementById('disable-toggle');
    checkbox.checked = isUserOptedOut();
    checkbox.addEventListener('change', () => {
      setUserBlinkOptOut(checkbox.checked);
      if (checkbox.checked) stopBlink(document.body); // opted out: remove animation immediately
      // else: next error event will call startBlink when needed
    });
  </script>
</body>
</html>
